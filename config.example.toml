# agent-in-chat-feishu configuration
#
# `agentchat setup feishu` is the recommended way to create this file.
# Strings support ${ENV_VAR} substitution.

language = "zh"
# data_dir = "~/.agentchat" # default runtime/session/cache directory
idle_timeout_mins = 30
attachment_send = "on"

[display]
tool_messages = false

[log]
level = "info" # debug, info, warn, error

[stream_preview]
enabled = true
interval_ms = 1000
min_delta_chars = 10
max_chars = 4000

[[projects]]
name = "my-project"
admin_from = "" # setup seeds the onboarding owner when available; use /whoami to edit manually
show_context_indicator = false
reply_footer = false
inject_sender = true

[projects.agent]
type = "codex"

[projects.agent.options]
work_dir = "/absolute/path/to/my-project"
mode = "yolo"
reasoning_effort = "medium"
model = "gpt-5.5"

[[projects.platforms]]
type = "feishu" # use "lark" for Lark international

[projects.platforms.options]
app_id = "${FEISHU_APP_ID}"
app_secret = "${FEISHU_APP_SECRET}"
allow_private_chats = "" # private chat_id allow-list. Empty means no private chat is bound yet.
allow_group_chats = "" # group chat_id allow-list. Empty means no group is bound yet.
auto_bind_chats = true # admin_from users auto-bind a chat on first valid trigger.
enable_feishu_card = true
progress_style = "card"
group_reply_all = false
share_session_in_channel = true
thread_isolation = false
group_context_buffer = true
context_buffer_max_messages = 100
context_buffer_max_age_mins = 0
