<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Agent in Chat Feishu</title>
  <desc id="desc">A banner showing coding agents running inside a Feishu chat loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0f2c3f"/>
      <stop offset="100%" stop-color="#123a36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="960" height="260" rx="0" fill="url(#bg)"/>
  <g fill="none" stroke="rgba(255,255,255,.16)" stroke-width="1">
    <path d="M70 60h250a28 28 0 0 1 28 28v42a28 28 0 0 1-28 28H70a28 28 0 0 1-28-28V88a28 28 0 0 1 28-28Z"/>
    <path d="M625 84h265a28 28 0 0 1 28 28v58a28 28 0 0 1-28 28H625a28 28 0 0 1-28-28v-58a28 28 0 0 1 28-28Z"/>
    <path d="M360 130h220"/>
    <path d="M548 108l32 22-32 22"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="103" fill="#dbeafe" font-size="18" font-weight="700">Feishu group</text>
    <text x="72" y="132" fill="#9ca3af" font-size="15">People talk normally</text>
    <text x="646" y="126" fill="#ccfbf1" font-size="18" font-weight="700">Codex sees context</text>
    <text x="646" y="155" fill="#9ca3af" font-size="15">Then acts in the same loop</text>
    <text x="480" y="68" fill="url(#accent)" font-size="42" text-anchor="middle" font-weight="800">Agent in Chat Feishu</text>
    <text x="480" y="214" fill="#cbd5e1" font-size="20" text-anchor="middle">Codex, Claude Code, and more inside everyday team chat</text>
  </g>
